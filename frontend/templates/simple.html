<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workflow Automation Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
        <div class="text-center">
            <h1 class="text-4xl font-bold text-indigo-600 mb-4">
                Workflow Automation Platform
            </h1>
            <p class="text-xl text-gray-600 mb-8">
                Plataforma de automação de workflows e integrações internas
            </p>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 max-w-4xl mx-auto">
                <a href="/docs" class="bg-white p-6 rounded-lg shadow hover:shadow-lg transition-shadow">
                    <div class="text-indigo-600 text-3xl mb-2">📚</div>
                    <h3 class="font-semibold text-gray-900">Documentação API</h3>
                    <p class="text-sm text-gray-500 mt-2">Swagger / OpenAPI</p>
                </a>
                
                <a href="/health" class="bg-white p-6 rounded-lg shadow hover:shadow-lg transition-shadow">
                    <div class="text-green-600 text-3xl mb-2">✓</div>
                    <h3 class="font-semibold text-gray-900">Health Check</h3>
                    <p class="text-sm text-gray-500 mt-2">Verificar status</p>
                </a>
                
                <div class="bg-white p-6 rounded-lg shadow">
                    <div class="text-blue-600 text-3xl mb-2">ℹ️</div>
                    <h3 class="font-semibold text-gray-900">Versão 1.0.0</h3>
                    <p class="text-sm text-gray-500 mt-2">API Rodando</p>
                </div>
            </div>
            
            <div class="mt-12 p-4 bg-indigo-50 rounded-lg max-w-2xl mx-auto">
                <h4 class="font-semibold text-indigo-900 mb-2">Teste de Login</h4>
                <p class="text-sm text-indigo-700 mb-4">
                    Use as credenciais de teste no /docs:<br>
                    <strong>admin@example.com</strong> / <strong>admin123</strong>
                </p>
            </div>
        </div>
    </div>
</body>
</html>
