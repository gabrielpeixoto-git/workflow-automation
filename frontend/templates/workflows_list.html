{% extends "base.html" %}

{% block title %}Workflows - Workflow Automation{% endblock %}

{% block content %}
<div class="space-y-6" x-data="{ showNewModal: false }">
    <!-- Header -->
    <div class="sm:flex sm:items-center sm:justify-between">
        <div>
            <h1 class="text-2xl font-bold text-gray-900">Workflows</h1>
            <p class="mt-1 text-sm text-gray-500">Gerencie seus workflows de automação</p>
        </div>
        <div class="mt-4 sm:mt-0">
            <button 
                @click="showNewModal = true"
                class="inline-flex items-center px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                <i data-lucide="plus" class="h-4 w-4 mr-2"></i>
                Novo Workflow
            </button>
        </div>
    </div>

    <!-- Filters -->
    <div class="bg-white shadow rounded-lg p-4">
        <div class="flex space-x-4">
            <select 
                name="status" 
                class="block w-48 pl-3 pr-10 py-2 text-base border-gray-300 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm rounded-md"
                hx-get="/api/workflows"
                hx-target="#workflows-list"
                hx-trigger="change"
                hx-include="[name='status']">
                <option value="">Todos os status</option>
                <option value="active">Ativos</option>
                <option value="inactive">Inativos</option>
                <option value="draft">Rascunhos</option>
            </select>
            
            <input 
                type="text" 
                name="search" 
                placeholder="Buscar workflows..."
                class="block w-64 pl-3 pr-10 py-2 text-base border-gray-300 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm rounded-md"
                hx-get="/api/workflows"
                hx-target="#workflows-list"
                hx-trigger="keyup changed delay:500ms"
                hx-include="[name='search']">
        </div>
    </div>

    <!-- Workflows List -->
    <div id="workflows-list" class="bg-white shadow overflow-hidden sm:rounded-md" hx-get="/api/workflows" hx-trigger="load">
        <div class="animate-pulse p-4">
            <div class="h-16 bg-gray-200 rounded mb-4"></div>
            <div class="h-16 bg-gray-200 rounded mb-4"></div>
            <div class="h-16 bg-gray-200 rounded"></div>
        </div>
    </div>

    <!-- New Workflow Modal -->
    <div x-show="showNewModal" class="fixed inset-0 z-10 overflow-y-auto" aria-labelledby="modal-title" role="dialog" aria-modal="true" x-cloak>
        <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
            <div 
                x-show="showNewModal"
                x-transition:enter="ease-out duration-300"
                x-transition:enter-start="opacity-0"
                x-transition:enter-end="opacity-100"
                x-transition:leave="ease-in duration-200"
                x-transition:leave-start="opacity-100"
                x-transition:leave-end="opacity-0"
                class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity" 
                aria-hidden="true"
                @click="showNewModal = false"></div>

            <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>

            <div 
                x-show="showNewModal"
                x-transition:enter="ease-out duration-300"
                x-transition:enter-start="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
                x-transition:enter-end="opacity-100 translate-y-0 sm:scale-100"
                x-transition:leave="ease-in duration-200"
                x-transition:leave-start="opacity-100 translate-y-0 sm:scale-100"
                x-transition:leave-end="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
                class="inline-block align-bottom bg-white rounded-lg text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg w-full">
                <div class="bg-white px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
                    <h3 class="text-lg leading-6 font-medium text-gray-900" id="modal-title">
                        Criar Novo Workflow
                    </h3>
                    <div class="mt-4 space-y-4">
                        <div>
                            <label for="wf-name" class="block text-sm font-medium text-gray-700">Nome</label>
                            <input type="text" id="wf-name" name="name" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                        </div>
                        <div>
                            <label for="wf-slug" class="block text-sm font-medium text-gray-700">Slug</label>
                            <input type="text" id="wf-slug" name="slug" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                        </div>
                        <div>
                            <label for="wf-desc" class="block text-sm font-medium text-gray-700">Descrição</label>
                            <textarea id="wf-desc" name="description" rows="3" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm"></textarea>
                        </div>
                    </div>
                </div>
                <div class="bg-gray-50 px-4 py-3 sm:px-6 sm:flex sm:flex-row-reverse">
                    <button 
                        type="button"
                        @click="createWorkflow()"
                        class="w-full inline-flex justify-center rounded-md border border-transparent shadow-sm px-4 py-2 bg-indigo-600 text-base font-medium text-white hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 sm:ml-3 sm:w-auto sm:text-sm">
                        Criar
                    </button>
                    <button 
                        type="button"
                        @click="showNewModal = false"
                        class="mt-3 w-full inline-flex justify-center rounded-md border border-gray-300 shadow-sm px-4 py-2 bg-white text-base font-medium text-gray-700 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 sm:mt-0 sm:ml-3 sm:w-auto sm:text-sm">
                        Cancelar
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
function createWorkflow() {
    const name = document.getElementById('wf-name').value;
    const slug = document.getElementById('wf-slug').value;
    const description = document.getElementById('wf-desc').value;
    
    if (!name || !slug) {
        alert('Nome e slug são obrigatórios');
        return;
    }
    
    fetch('/api/workflows', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
        },
        body: JSON.stringify({
            name,
            slug,
            description,
            status: 'draft',
            tags: [],
            steps: []
        })
    })
    .then(response => {
        if (response.ok) {
            window.location.reload();
        } else {
            alert('Erro ao criar workflow');
        }
    });
}
</script>
{% endblock %}
